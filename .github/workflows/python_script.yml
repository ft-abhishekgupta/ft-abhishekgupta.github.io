name: Update Games, Movies & Clicks Data

on:
  schedule:
    - cron: "0 0 * * *" # Runs at 00:00 UTC every day
  workflow_dispatch: # Manual trigger

jobs:
  update_data:
    name: Scrape games, movies and download click images
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape games from Backloggd
        working-directory: scripts
        run: python getGames.py

      - name: Scrape movies from Letterboxd
        working-directory: scripts
        run: python getMovies.py

      - name: Update clicks and download images
        working-directory: scripts
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python getClicks.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Abhishek Gupta"
          git config --global user.email "ft.abhishekgupta@gmail.com"
          git add scripts/data/ public/clicks/
          git diff --staged --quiet || git commit -m "Update games, movies data and click images"
          git push
